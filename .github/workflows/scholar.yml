name: Update Google Scholar citations

on:
  schedule:
    - cron: "0 7 * * *"   # daily at 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch citation count
        id: fetch
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          if [ -z "$SERPAPI_KEY" ]; then
            echo "SERPAPI_KEY secret not set; keeping existing value."
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # SerpApi Google Scholar Author API (reliable; Scholar blocks direct CI scraping).
          # One call returns both the total citation count and the per-article counts.
          URL="https://serpapi.com/search.json?engine=google_scholar_author&author_id=t6exkOAAAAAJ&hl=en&num=100&api_key=${SERPAPI_KEY}"
          JSON=$(curl -s "$URL" || true)
          # Total citations live at .cited_by.table[0].citations.all
          COUNT=$(printf '%s' "$JSON" | jq -r '.cited_by.table[0].citations.all // empty' 2>/dev/null)
          if ! printf '%s' "$COUNT" | grep -qE '^[0-9]+$'; then
            echo "Could not parse citation count; keeping existing value."
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Comma-format the integer (e.g. 52405 -> 52,405), locale-independent.
          FORMATTED=$(printf '%s' "$COUNT" | sed -E ':a;s/([0-9]+)([0-9]{3})/\1,\2/;ta')
          echo "Parsed citations: $FORMATTED"
          echo "ok=true" >> "$GITHUB_OUTPUT"
          echo "formatted=$FORMATTED" >> "$GITHUB_OUTPUT"

          # Grad-CAM paper, matched by its citation_id; floor to nearest thousand -> "41k+".
          GRADCAM=$(printf '%s' "$JSON" | jq -r '.articles[]? | select(.citation_id=="t6exkOAAAAAJ:u-x6o8ySG0sC") | .cited_by.value // empty' 2>/dev/null)
          if printf '%s' "$GRADCAM" | grep -qE '^[0-9]+$'; then
            GRADCAM_FMT="$(( GRADCAM / 1000 ))k+"
            echo "Parsed Grad-CAM citations: $GRADCAM ($GRADCAM_FMT)"
          else
            # Keep the existing value if the article wasn't found.
            GRADCAM_FMT=$(grep -E '^gradcam:' _data/scholar.yml | sed -E 's/^[^"]*"([^"]*)".*$/\1/')
            echo "Could not parse Grad-CAM citations; keeping existing value ($GRADCAM_FMT)."
          fi
          echo "gradcam=$GRADCAM_FMT" >> "$GITHUB_OUTPUT"

      - name: Write _data/scholar.yml
        if: steps.fetch.outputs.ok == 'true'
        run: |
          cat > _data/scholar.yml <<EOF
          # Auto-updated daily by .github/workflows/scholar.yml
          # \`citations\` is the total citation count from Google Scholar, comma-formatted.
          # \`gradcam\` is the Grad-CAM paper's citation count, floored to the nearest thousand (e.g. "41k+").
          citations: "${{ steps.fetch.outputs.formatted }}"
          gradcam: "${{ steps.fetch.outputs.gradcam }}"
          EOF

      - name: Commit if changed
        if: steps.fetch.outputs.ok == 'true'
        run: |
          git config user.name "Abhishek Das"
          git config user.email "das.abhshk@gmail.com"
          if git diff --quiet -- _data/scholar.yml; then
            echo "No change in citation count."
          else
            git add _data/scholar.yml
            git commit -m "Update Google Scholar citation count"
            git pull --rebase origin master
            git push
          fi
