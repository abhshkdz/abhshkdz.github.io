name: Update Google Scholar citations

on:
  schedule:
    - cron: "0 7 * * *"   # daily at 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch citation count
        id: fetch
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          if [ -z "$SERPAPI_KEY" ]; then
            echo "SERPAPI_KEY secret not set; keeping existing value."
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # SerpApi Google Scholar Author API (reliable; Scholar blocks direct CI scraping).
          URL="https://serpapi.com/search.json?engine=google_scholar_author&author_id=t6exkOAAAAAJ&hl=en&api_key=${SERPAPI_KEY}"
          JSON=$(curl -s "$URL" || true)
          # Total citations live at .cited_by.table[0].citations.all
          COUNT=$(printf '%s' "$JSON" | jq -r '.cited_by.table[0].citations.all // empty' 2>/dev/null)
          if ! printf '%s' "$COUNT" | grep -qE '^[0-9]+$'; then
            echo "Could not parse citation count; keeping existing value."
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Comma-format the integer (e.g. 52405 -> 52,405), locale-independent.
          FORMATTED=$(printf '%s' "$COUNT" | sed -E ':a;s/([0-9]+)([0-9]{3})/\1,\2/;ta')
          echo "Parsed citations: $FORMATTED"
          echo "ok=true" >> "$GITHUB_OUTPUT"
          echo "formatted=$FORMATTED" >> "$GITHUB_OUTPUT"

      - name: Write _data/scholar.yml
        if: steps.fetch.outputs.ok == 'true'
        run: |
          cat > _data/scholar.yml <<EOF
          # Auto-updated daily by .github/workflows/scholar.yml
          # \`citations\` is the total citation count from Google Scholar, comma-formatted.
          citations: "${{ steps.fetch.outputs.formatted }}"
          EOF

      - name: Commit if changed
        if: steps.fetch.outputs.ok == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- _data/scholar.yml; then
            echo "No change in citation count."
          else
            git add _data/scholar.yml
            git commit -m "Update Google Scholar citation count"
            git push
          fi
