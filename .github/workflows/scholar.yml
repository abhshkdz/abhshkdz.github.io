name: Update Google Scholar citations

on:
  schedule:
    - cron: "0 7 * * *"   # daily at 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch citation count
        id: fetch
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          URL="https://scholar.google.com/citations?user=t6exkOAAAAAJ&hl=en"
          HTML=$(curl -s --compressed -A "$UA" "$URL" || true)
          # First .gsc_rsb_std cell is the total ("Citations / All")
          COUNT=$(printf '%s' "$HTML" | grep -o 'gsc_rsb_std[^>]*>[0-9]\+' | head -1 | grep -o '[0-9]\+')
          if [ -z "$COUNT" ]; then
            echo "Could not parse citation count; keeping existing value."
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Comma-format the integer (e.g. 52405 -> 52,405)
          FORMATTED=$(LC_ALL=en_US.UTF-8 printf "%'d" "$COUNT")
          echo "Parsed citations: $FORMATTED"
          echo "ok=true" >> "$GITHUB_OUTPUT"
          echo "formatted=$FORMATTED" >> "$GITHUB_OUTPUT"

      - name: Write _data/scholar.yml
        if: steps.fetch.outputs.ok == 'true'
        run: |
          cat > _data/scholar.yml <<EOF
          # Auto-updated daily by .github/workflows/scholar.yml
          # \`citations\` is the total citation count from Google Scholar, comma-formatted.
          citations: "${{ steps.fetch.outputs.formatted }}"
          EOF

      - name: Commit if changed
        if: steps.fetch.outputs.ok == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- _data/scholar.yml; then
            echo "No change in citation count."
          else
            git add _data/scholar.yml
            git commit -m "Update Google Scholar citation count"
            git push
          fi
