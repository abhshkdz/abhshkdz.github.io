---
layout: default
---

<article class="post">
    <div class="row">
        <div class="col-xs-12">
            <h1 class="content">{{page.title}}</h1>
        </div>
    </div>
    <div class="row">
        <div class="col-xs-12">
            <h2 class="excerpt">{{ page.excerpt }}</h2>
        </div>
    </div>
    <section class="post-content">
        {{ content }}
    </section>
    <div class="when">{{ page.date | date: "%d %B %Y" }}</div>
    <div class='share'>
        <iframe src="https://ghbtns.com/github-btn.html?user=abhshkdz&type=follow&count=true" frameborder="0" scrolling="0" width="170px" height="20px" style="margin-right:20px;"></iframe>
    </div>
    <hr>
</article>
